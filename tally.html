<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Employee Tally</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f0ede8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --border-md: rgba(0,0,0,0.15);
      --text: #111111;
      --muted: #777777;
      --accent: #1d4ed8;
      --purple: #2563eb;
      --green: #15803d;
      --red: #dc2626;
      --radius: 14px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    .app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; background: var(--bg); }

    /* Topbar */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: calc(12px + var(--safe-top)) 16px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; }
    .topbar-left { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; overflow: hidden; }
    .menu-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .job-name-display { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Job/Area bars */
    .area-bar { background: #f7f5f2; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; }
    .area-scroll { display: flex; overflow-x: auto; padding: 0 12px; gap: 2px; scrollbar-width: none; align-items: stretch; }
    .area-scroll::-webkit-scrollbar { display: none; }
    .area-tab { padding: 9px 14px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; border: none; background: none; border-bottom: 2.5px solid transparent; color: var(--muted); white-space: nowrap; }
    .area-tab.active { border-bottom-color: var(--purple); color: var(--purple); }
    .area-tab-inner { display: flex; align-items: center; gap: 5px; }
    .area-pencil { display: flex; align-items: center; opacity: 0.6; }
    .add-area-btn { background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); padding: 9px 13px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; white-space: nowrap; margin: 4px 10px 4px auto; flex-shrink: 0; }

    /* Info strips */
    .area-info-bar { background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow: hidden; }
    .area-info-scroll { display: flex; overflow-x: auto; padding: 7px 14px; gap: 8px; scrollbar-width: none; align-items: center; }
    .area-info-scroll::-webkit-scrollbar { display: none; }
    .area-info-chip { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; white-space: nowrap; flex-shrink: 0; }
    .area-info-chip-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .area-info-chip-val { font-size: 12px; font-weight: 500; }

    /* Category tabs */
    .cat-bar { background: #1a1f2e; flex-shrink: 0; }
    .cat-scroll { display: flex; overflow-x: auto; padding: 0 12px; gap: 2px; scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tab { padding: 11px 16px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; border: none; background: none; border-bottom: 2.5px solid transparent; color: rgba(255,255,255,0.45); white-space: nowrap; letter-spacing: 0.02em; }
    .cat-tab.active { color: #fff; border-bottom-color: #fff; }

    /* Type tabs */
    .type-bar { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .type-scroll { display: flex; overflow-x: auto; padding: 0 12px; gap: 2px; scrollbar-width: none; }
    .type-scroll::-webkit-scrollbar { display: none; }
    .type-tab { padding: 11px 13px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; border: none; background: none; border-bottom: 2.5px solid transparent; color: var(--muted); white-space: nowrap; }

    /* Tally area */
    .tally-area { flex: 1; overflow-y: auto; padding: 16px 14px 10px; -webkit-overflow-scrolling: touch; }
    .tally-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .tally-type-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
    .tally-subtotal { font-size: 12px; color: var(--muted); }
    .tally-subtotal strong { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); }

    /* Sheet cards */
    .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sheet-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
    .sheet-card-top { padding: 20px 12px 14px; text-align: center; flex: 1; }
    .sheet-ft { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .sheet-count { font-family: 'DM Mono', monospace; font-size: 54px; font-weight: 500; line-height: 1; cursor: text; }
    .sheet-count-input { font-family: 'DM Mono', monospace; font-size: 54px; font-weight: 500; color: var(--accent); line-height: 1; width: 100%; border: none; border-bottom: 2px solid var(--accent); background: transparent; text-align: center; outline: none; padding: 0; -moz-appearance: textfield; }
    .sheet-count-input::-webkit-inner-spin-button, .sheet-count-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .sheet-card-controls { display: flex; border-top: 1px solid var(--border); }
    .ctrl { flex: 1; height: 50px; border: none; background: none; font-size: 24px; color: var(--muted); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: background 0.1s, color 0.1s; }
    .ctrl:active { background: color-mix(in srgb, var(--add-color, var(--accent)) 10%, white); color: var(--add-color, var(--accent)); }
    .ctrl-divider { width: 1px; background: var(--border); flex-shrink: 0; }

    /* Measurement list (ceilings, insulation bags) */
    .meas-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .meas-row { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    .meas-dims { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; flex: 1; }
    .meas-sqft { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
    .meas-del { width: 26px; height: 26px; border-radius: 50%; border: none; background: #fee2e2; color: var(--red); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }
    .meas-add-row { display: flex; gap: 8px; align-items: center; }
    .meas-input { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; width: 80px; height: 44px; border: 1.5px solid var(--border-md); border-radius: 10px; background: var(--surface); text-align: center; outline: none; padding: 0 8px; -moz-appearance: textfield; }
    .meas-input::-webkit-inner-spin-button, .meas-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .meas-input:focus { border-color: var(--accent); }
    .meas-x { font-size: 16px; color: var(--muted); font-weight: 500; flex-shrink: 0; }
    .meas-add-btn { height: 44px; padding: 0 16px; border: none; border-radius: 10px; font-size: 14px; font-family: inherit; font-weight: 600; color: #fff; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

    /* Section headers inside tally */
    .section-head { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 8px; display: flex; justify-content: space-between; align-items: center; }

    /* Empty state */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px 24px; text-align: center; }
    .empty-state-icon { width: 64px; height: 64px; border-radius: 20px; background: var(--purple); display: flex; align-items: center; justify-content: center; }
    .empty-state h3 { font-size: 18px; font-weight: 600; }
    .empty-state p { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .empty-cta { background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px 24px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; }

    /* Bottom bar */
    .bottom-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 12px calc(10px + var(--safe-bottom)); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .totals-strip { flex: 1; display: flex; align-items: center; gap: 7px; overflow-x: auto; scrollbar-width: none; min-width: 0; }
    .totals-strip::-webkit-scrollbar { display: none; }
    .strip-chip { border-radius: 20px; padding: 6px 11px; font-size: 12px; white-space: nowrap; flex-shrink: 0; border: 1px solid var(--border); color: var(--muted); background: var(--bg); }
    .strip-chip strong { font-family: 'DM Mono', monospace; color: var(--text); font-weight: 500; }
    .report-btn { background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; flex-shrink: 0; }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 78vw; max-width: 300px; background: #1a1f2e; z-index: 51; display: flex; flex-direction: column; padding: calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom)); gap: 14px; transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
    .drawer.open { transform: translateX(0); }
    .drawer-title { font-size: 16px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
    .drawer-new-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; }
    .drawer-label { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; }
    .drawer-job-list { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; flex: 1; }
    .drawer-job-item { padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.6); transition: background 0.12s, color 0.12s; display: flex; align-items: center; gap: 8px; }
    .drawer-job-item.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 500; }

    /* Bottom sheets */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 60; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .bottom-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); padding-bottom: var(--safe-bottom); }
    .sheet-overlay.open .bottom-sheet { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border-md); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .sheet-header { padding: 14px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sheet-header h3 { font-size: 16px; font-weight: 600; }
    .sheet-close { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); border: none; font-size: 15px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .sheet-body { overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 16px; }
    .sheet-footer { padding: 0 20px 20px; flex-shrink: 0; }
    .sheet-save-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; }

    /* Form fields */
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .field-input { font-size: 15px; font-family: inherit; color: var(--text); border: none; border-bottom: 1px solid var(--border-md); background: transparent; outline: none; padding: 6px 0; width: 100%; }
    .field-input:focus { border-bottom-color: var(--accent); }
    .field-select { font-size: 15px; font-family: inherit; color: var(--text); border: none; border-bottom: 1px solid var(--border-md); background: transparent; outline: none; padding: 6px 0; width: 100%; appearance: none; -webkit-appearance: none; }
    .field-select:focus { border-bottom-color: var(--accent); }
    .field-readonly { font-size: 14px; color: var(--muted); padding: 6px 0; font-family: 'DM Mono', monospace; }
    .field-divider { height: 1px; background: var(--border); }

    /* Invoice / report */
    .empty-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; }
    .modal-area-head { font-size: 14px; font-weight: 600; color: var(--purple); margin: 18px 0 6px; padding-bottom: 6px; border-bottom: 1.5px solid #dbeafe; }
    .modal-area-head:first-child { margin-top: 0; }
    .inv-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
    .inv-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 4px 4px 4px 0; border-bottom: 1px solid var(--border-md); text-align: right; }
    .inv-table th:first-child { text-align: left; }
    .inv-table td { padding: 6px 4px 6px 0; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--muted); }
    .inv-table td:first-child { color: var(--text); }
    .inv-table td:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
    .inv-area-sub { text-align: right; font-size: 13px; color: var(--muted); padding: 4px 0 12px; border-top: 1px solid var(--border-md); }
    .inv-area-sub strong { color: var(--text); font-family: 'DM Mono', monospace; }
    .inv-totals { margin-top: 16px; border-top: 2px solid var(--border-md); padding-top: 12px; }
    .inv-totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .inv-totals-row .mono { font-family: 'DM Mono', monospace; }
    .inv-totals-row.grand { font-size: 16px; font-weight: 700; border-top: 2px solid var(--text); margin-top: 4px; padding-top: 10px; }
  </style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="menu-btn" onclick="openDrawer()">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <rect width="18" height="2" rx="1" fill="#111"/>
          <rect y="6" width="14" height="2" rx="1" fill="#111"/>
          <rect y="12" width="10" height="2" rx="1" fill="#111"/>
        </svg>
      </div>
      <div class="job-name-display" id="job-name-display"></div>
      <div onclick="openRenamePayPeriod()" style="flex-shrink:0;cursor:pointer;display:flex;align-items:center;color:var(--purple);opacity:0.7;padding:2px 0 0 2px">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9.5 1.5L12.5 4.5L4.5 12.5H1.5V9.5L9.5 1.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M8 3L11 6" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- Job tabs -->
  <div class="area-bar" style="background:#f0ede8;border-bottom:1px solid rgba(0,0,0,0.09)">
    <div class="area-scroll" id="unit-tabs"></div>
    <button class="add-area-btn" onclick="addUnit()">+ Add Job</button>
  </div>

  <!-- Job info strip -->
  <div class="area-info-bar" id="job-info-bar"></div>

  <!-- Area tabs -->
  <div class="area-bar">
    <div class="area-scroll" id="area-tabs"></div>
    <button class="add-area-btn" onclick="openAreaForm(null)">+ Add Area</button>
  </div>

  <!-- Area info strip -->
  <div class="area-info-bar" id="area-info-bar"></div>

  <!-- Category tabs -->
  <div class="cat-bar"><div class="cat-scroll" id="cat-tabs"></div></div>

  <!-- Type tabs -->
  <div class="type-bar" id="type-bar-wrap"><div class="type-scroll" id="type-tabs"></div></div>

  <div class="tally-area" id="tally-area"></div>

  <div class="bottom-bar">
    <div class="totals-strip" id="totals-strip"></div>
    <button class="report-btn" onclick="showReport()">Invoice</button>
  </div>

</div>

<!-- Confirm Dialog -->
<div id="confirm-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:24px">
  <div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:16px">
    <div id="confirm-message" style="font-size:15px;font-weight:500;text-align:center;line-height:1.5"></div>
    <div style="display:flex;gap:10px">
      <button onclick="confirmResolve(false)" style="flex:1;padding:13px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;color:#555">No</button>
      <button onclick="confirmResolve(true)" style="flex:1;padding:13px;border:none;border-radius:10px;background:var(--red);font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;color:#fff">Yes</button>
    </div>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title" style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="9" rx="1" fill="white" fill-opacity="0.7"/>
        <rect x="9" y="1" width="6" height="6" rx="1" fill="white" fill-opacity="0.7"/>
        <rect x="9" y="9" width="6" height="6" rx="1" fill="white" fill-opacity="0.4"/>
      </svg>
      Employee Tally
    </div>
    <button onclick="closeDrawer();openPrices()" style="background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;flex-shrink:0">Prices</button>
  </div>
  <button class="drawer-new-btn" onclick="newJob()">+ New Pay Period</button>
  <div class="drawer-label">Pay Periods</div>
  <div class="drawer-job-list" id="drawer-job-list"></div>
</div>

<!-- Job Form -->
<div class="sheet-overlay" id="job-form-overlay" onclick="if(event.target===this)closeJobForm()">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="job-form-title">Edit Job</h3>
      <button class="sheet-close" onclick="closeJobForm()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field-group">
        <div class="field-label">Job Name</div>
        <input class="field-input" id="jf-name" type="text" placeholder="e.g. Tower A, Unit 301…"/>
      </div>
      <div class="field-group">
        <div class="field-label">Rate <span style="color:var(--red)">*</span></div>
        <select class="field-select" id="jf-rate" onchange="document.getElementById('jf-townhouse-group').style.display=this.value==='lowrise'?'':'none'">
          <option value="">Select rate…</option>
          <option value="lowrise">Lowrise</option>
          <option value="highrise">Highrise</option>
        </select>
      </div>
      <div class="field-group" id="jf-townhouse-group" style="display:none">
        <div class="field-label">Townhouse</div>
        <select class="field-select" id="jf-townhouse">
          <option value="none">No</option>
          <option value="townhouse">Townhouse</option>
          <option value="stacked">Stacked</option>
        </select>
      </div>
      <div class="field-group">
        <div class="field-label">Energy Star</div>
        <select class="field-select" id="jf-energystar">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>
      <div class="field-divider"></div>
      <div class="field-group">
        <div class="field-label">Site</div>
        <input class="field-input" id="jf-site" type="text" placeholder="Site address"/>
      </div>
      <div class="field-group">
        <div class="field-label">Site Contact Name</div>
        <input class="field-input" id="jf-cname" type="text"/>
      </div>
      <div class="field-group">
        <div class="field-label">Site Contact Number</div>
        <input class="field-input" id="jf-cphone" type="tel"/>
      </div>
      <div class="field-group">
        <div class="field-label">Site Contact Email</div>
        <input class="field-input" id="jf-cemail" type="email"/>
      </div>
      <div class="field-group">
        <div class="field-label">Lockbox Code</div>
        <input class="field-input" id="jf-lockbox" type="text"/>
      </div>
      <div class="field-group">
        <div class="field-label">Notes</div>

        </svg>
        Export to PDF

<script>
'use strict';

/* ═══════════════════════════════════════════
   CONSTANTS & CONFIGURATION
═══════════════════════════════════════════ */

const CATS = [
  { label: 'Drywall',       key: 'drywall' },
  { label: 'Insulation',    key: 'insulation' },
  { label: 'Steel',         key: 'steel' },
  { label: 'Corner Beads',  key: 'cornerBeads' },
  { label: 'Extras',        key: 'jobExtras' },
];

// Drywall
const DRYWALL_TABS = [
  { label: '½"',     key: 'half',         color: '#2563eb' },
  { label: '⅝"',    key: 'fivet',         color: '#dc2626' },
  { label: 'Durock', key: 'durock',        color: '#111111' },
  { label: 'Extras', key: 'drywallExtras', color: '#0891b2' },
];
const HALF_GROUPS = [
  { label: '48" × ½"', key: 'half48',  lengths: [7,8,9,10,12], width: 4   },
  { label: '54" × ½"', key: 'half54',  lengths: [8,10,12],      width: 4.5 },
];
const FIVET_GROUPS = [
  { label: '48" × ⅝"', key: 'fivet48', lengths: [8,9,10,12],   width: 4   },
  { label: '54" × ⅝"', key: 'fivet54', lengths: [8,10,12],      width: 4.5 },
];
const DUROCK_LENGTHS = [5, 8];
const DUROCK_SQFT    = { 5: 15, 8: 32 };  // 3'×5'=15ft², 4'×8'=32ft²
const DRYWALL_KEYS   = [...HALF_GROUPS.map(g=>g.key), ...FIVET_GROUPS.map(g=>g.key), 'durock'];

// Build width lookup for sqft calculations
const GROUP_WIDTH = {};
[...HALF_GROUPS, ...FIVET_GROUPS].forEach(g => { GROUP_WIDTH[g.key] = g.width; });
GROUP_WIDTH['durock'] = 4;

function sheetSqft(key, len) {
  if (key === 'durock') return DUROCK_SQFT[len] ?? 4 * len;
  return (GROUP_WIDTH[key] || 4) * len;
}

// Insulation
const INSULATION_TYPES = [
  { label: 'Pink',     fullName: 'Pink Insulation', key: 'pink',     color: '#db2777', items: ['Interior', 'Exterior'] },
  { label: 'Rockwool', fullName: 'Rockwool',         key: 'rockwool', color: '#b45309', items: ['Interior', 'Exterior'] },
  { label: 'R-24',     fullName: 'R-24',             key: 'r24',      color: '#0369a1', items: ['Interior', 'Exterior'] },
];
const INS_EXTRAS_PAID      = [];
const INS_EXTRAS_PURCHASED = ["8' Poly", "9' Poly", "10' Poly", "12' Poly", 'Tuck Tape', 'Can Foam', 'Staples', 'Acoustic Caulking'];
const INS_EXTRAS_ALL       = [...INS_EXTRAS_PAID, ...INS_EXTRAS_PURCHASED];

// Steel
const STEEL_LENGTHS = [8, 9, 10, 12];
const STEEL_SUBTYPES = [
  { key: 'steel_studs', label: 'Studs' },
  { key: 'steel_ceil',  label: 'Suspended Ceiling', kind: 'measure', sections: ['Suspended Ceiling', 'Ceilings with Hangers'] },
  { key: 'steel_doors', label: 'Door Frames', items: ['Single', 'Double'] },
];

// Corner Beads
const CORNER_BEAD_LENGTHS = [8, 9, 10, 12];
const CORNER_BEAD_SUBTYPES = [
  { key: 'cb_regular',  label: 'Regular Bead' },
  { key: 'cb_bullnose', label: 'Bullnose Bead' },
];

// Extras
const JOB_EXTRAS_PAID      = ['Pot Light/Sprinkler', 'Tray/Waffle', "2' × 4' Skylight", "4' × 4' Skylight", 'Round Stairs', 'OTA/Cathedral', 'Hourly'];
const JOB_EXTRAS_PURCHASED = [];
const JOB_EXTRAS_ALL       = [...JOB_EXTRAS_PAID, ...JOB_EXTRAS_PURCHASED];
const DRYWALL_EXTRAS        = ['Screws (Box)'];

/* ═══════════════════════════════════════════
   DATA MODEL
═══════════════════════════════════════════ */

function blankCounts() {
  const c = {};
  // Drywall
  [...HALF_GROUPS, ...FIVET_GROUPS].forEach(g => { c[g.key] = {}; g.lengths.forEach(l => c[g.key][l] = 0); });
  c['durock'] = {}; DUROCK_LENGTHS.forEach(l => c['durock'][l] = 0);
  // Insulation: each item holds an array of {bags, sqftPerBag} entries
  c['insulation'] = {};
  INSULATION_TYPES.forEach(t => {
    c['insulation'][t.key] = {};
    t.items.forEach(item => { c['insulation'][t.key][item] = []; });
  });
  // Steel
  STEEL_SUBTYPES.forEach(st => {
    if (st.kind === 'measure') {
      c[st.key] = {};
      st.sections.forEach(s => { c[st.key][s] = []; });
    } else if (st.items) {
      c[st.key] = {};
      st.items.forEach(item => { c[st.key][item] = 0; });
    } else {
      c[st.key] = {};
      STEEL_LENGTHS.forEach(l => { c[st.key][l] = 0; });
    }
  });
  // Corner Beads
  CORNER_BEAD_SUBTYPES.forEach(st => {
    c[st.key] = {};
    CORNER_BEAD_LENGTHS.forEach(l => { c[st.key][l] = 0; });
  });
  // Extras
  c['drywallExtras'] = {}; DRYWALL_EXTRAS.forEach(item => { c['drywallExtras'][item] = 0; });
  c['insExtras'] = {};  INS_EXTRAS_ALL.forEach(item => { c['insExtras'][item] = 0; });
  c['jobExtras'] = {};  JOB_EXTRAS_ALL.forEach(item => { c['jobExtras'][item] = 0; });
  return c;
}

function makeUnit(name, id) {
  return { id, name, rate: '', townhouse: 'none', energyStar: 'no', areas: [], areaCounter: 0 };
}
function makeArea(name, id, height) {
  return { id, name, height: height || '', counts: blankCounts() };
}
function makeJob(name, id) {
  const now = new Date().toISOString();
  return { id, name, units: [], unitCounter: 0, details: { site:'', contactName:'', contactPhone:'', contactEmail:'', lockbox:'', notes:'' }, createdAt: now, modifiedAt: now };
}

/* ═══════════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════════ */

function saveState() {
  try { localStorage.setItem('drywall-tally', JSON.stringify({ jobs, jobCounter, curJobId })); } catch(e) {}
}

function deepMerge(target, source) {
  if (typeof target !== 'object' || target === null) return source ?? target;
  if (Array.isArray(target)) return Array.isArray(source) ? source : target;
  const out = { ...target };
  Object.keys(target).forEach(k => { out[k] = (source && k in source) ? deepMerge(target[k], source[k]) : target[k]; });
  return out;
}

function loadState() {
  try {
    const raw = localStorage.getItem('drywall-tally');
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (!s.jobs || !s.jobs.length) return false;
    s.jobs.forEach(j => {
      // Migrate flat areas → units structure
      if (j.areas && !j.units) {
        j.units = [{ id: 1, name: 'Job 1', rate: '', townhouse: 'none', energyStar: 'no', areas: j.areas, areaCounter: j.areaCounter || j.areas.length }];
        j.unitCounter = 1;
        delete j.areas; delete j.areaCounter;
      }
      if (!j.units) { j.units = []; j.unitCounter = 0; }
      j.units.forEach(u => {
        if (!u.rate)       u.rate = '';
        if (!u.townhouse)  u.townhouse = 'none';
        if (!u.energyStar) u.energyStar = 'no';
        u.areas.forEach(a => {
          a.counts = deepMerge(blankCounts(), a.counts);
          // Remove legacy fields
          delete a.rate; delete a.texture;
        });
      });
    });
    jobs = s.jobs;
    jobCounter = s.jobCounter || jobs.length;
    curJobId = s.curJobId || jobs[0].id;
    return true;
  } catch(e) { return false; }
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */

let jobs, jobCounter, curJobId;
let curUnitId  = null;
let curAreaId  = null;
let curCat     = 'drywall';
let curDrywallTab   = 0;  // 0=½", 1=⅝", 2=Durock
let curInsType      = 0;  // index into INSULATION_TYPES
let curInsSubTab    = 0;  // 0=type, 1=extras
let curCornerBeadSubType = 0; // index into CORNER_BEAD_SUBTYPES
let curSteelSubType = 0;  // index into STEEL_SUBTYPES

const J = () => jobs.find(j => j.id === curJobId);
const U = () => J()?.units?.find(u => u.id === curUnitId);
const A = () => U()?.areas?.find(a => a.id === curAreaId);

if (!loadState()) {
  const firstJob = makeJob(payPeriodName(new Date()), 1);
  firstJob.units = [makeUnit('Job 1', 1)];
  firstJob.unitCounter = 1;
  jobs = [firstJob];
  jobCounter = 1;
  curJobId = 1;
}
curUnitId = J()?.units[0]?.id ?? null;
curAreaId = U()?.areas[0]?.id ?? null;

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */

function payPeriodName(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  const back = day >= 5 ? day - 5 : day + 2;
  const fri = new Date(d); fri.setDate(d.getDate() - back);
  const thu = new Date(fri); thu.setDate(fri.getDate() + 6);
  const short = dt => dt.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  const full  = dt => dt.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
  return `${short(fri)} – ${full(thu)}`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function encodeKey(str) { return String(str).replace(/[^a-zA-Z0-9]/g, '_'); }

function fmt$(n) { return '$' + n.toFixed(2); }

/* ═══════════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════════ */

let _confirmCb = null;
function showConfirm(msg, cb) {
  document.getElementById('confirm-message').textContent = msg;
  document.getElementById('confirm-overlay').style.display = 'flex';
  _confirmCb = cb;
}
function confirmResolve(result) {
  document.getElementById('confirm-overlay').style.display = 'none';
  if (_confirmCb) { _confirmCb(result); _confirmCb = null; }
}

/* ═══════════════════════════════════════════
   DRAWER / PAY PERIODS
═══════════════════════════════════════════ */

function openDrawer()  {
  renderDrawerList(null);
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  const i = document.getElementById('drawer-rename'); if (i) i.blur();
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}
function renderDrawerList(editId) {
  document.getElementById('drawer-job-list').innerHTML = jobs.map(j => {
    if (editId && j.id === editId) {
      return `<div class="drawer-job-item active">
        <input id="drawer-rename" type="text" value="${j.name}"
          style="background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.5);color:#fff;font-size:14px;font-family:inherit;flex:1;outline:none;padding:0"
          onblur="commitDrawerRename(${j.id})" onkeydown="if(event.key==='Enter')this.blur();event.stopPropagation();" onclick="event.stopPropagation()"/>
      </div>`;
    }
    return `<div class="drawer-job-item ${j.id === curJobId ? 'active' : ''}" onclick="selectJob(${j.id})">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${j.name}</span>
      <button onclick="event.stopPropagation();deleteJob(${j.id})" style="flex-shrink:0;width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
    </div>`;
  }).join('');
  if (editId) setTimeout(() => { const i = document.getElementById('drawer-rename'); if (i) { i.focus(); i.select(); } }, 30);
}
function commitDrawerRename(id) {
  const inp = document.getElementById('drawer-rename'); if (!inp) return;
  const val = inp.value.trim() || payPeriodName(new Date());
  jobs.find(j => j.id === id).name = val;
  if (id === curJobId) document.getElementById('job-name-display').textContent = val;
  saveState(); renderDrawerList(null);
}
function selectJob(id) {
  curJobId = id;
  curUnitId = J().units[0]?.id ?? null;
  curAreaId = U()?.areas[0]?.id ?? null;
  curCat = 'drywall'; curDrywallTab = 0;
  saveState(); closeDrawer(); renderAll();
}
function newJob() {
  const newJ = makeJob(payPeriodName(new Date()), ++jobCounter);
  newJ.units = [makeUnit('Job 1', 1)]; newJ.unitCounter = 1;
  jobs.push(newJ);
  curJobId = jobCounter; curUnitId = 1; curAreaId = null;
  curCat = 'drywall'; curDrywallTab = 0;
  saveState();
  document.getElementById('job-name-display').textContent = J().name;
  renderAll();
  openDrawer(); renderDrawerList(jobCounter);
}
function deleteJob(id) {
  if (jobs.length === 1) return;
  showConfirm('Delete this pay period?', yes => {
    if (!yes) return;
    jobs = jobs.filter(j => j.id !== id);
    if (curJobId === id) {
      curJobId = jobs[0].id;
      curUnitId = J().units[0]?.id ?? null;
      curAreaId = U()?.areas[0]?.id ?? null;
    }
    saveState(); renderDrawerList(null); renderAll();
  });
}

/* ═══════════════════════════════════════════
   PAY PERIOD DETAILS
═══════════════════════════════════════════ */

function openRenamePayPeriod() {
  document.getElementById('df-name').value = J().name;
  document.getElementById('details-overlay').classList.add('open');
  setTimeout(() => document.getElementById('df-name').focus(), 300);
}
function saveRenamePayPeriod() {
  const j = J();
  const val = document.getElementById('df-name').value.trim();
  if (val) j.name = val;
  j.modifiedAt = new Date().toISOString();
  document.getElementById('job-name-display').textContent = j.name;
  saveState(); renderDrawerList(null); closeDetails();
}
function closeDetails() { document.getElementById('details-overlay').classList.remove('open'); }
// Keep openDetails as alias for openRenamePayPeriod for any legacy calls
function openDetails() { openRenamePayPeriod(); }

/* ═══════════════════════════════════════════
   JOB (UNIT) FORM
═══════════════════════════════════════════ */

let _unitFormId = null;

function openUnitForm(editId) {
  _unitFormId = editId;
  const u = editId ? J().units.find(x => x.id === editId) : null;
  document.getElementById('job-form-title').textContent = editId ? 'Edit Job' : 'New Job';
  const jd = J().details;
  document.getElementById('jf-name').value       = u?.name ?? '';
  document.getElementById('jf-rate').value       = u?.rate ?? '';
  document.getElementById('jf-townhouse').value  = u?.townhouse ?? 'none';
  document.getElementById('jf-energystar').value = u?.energyStar ?? 'no';
  document.getElementById('jf-townhouse-group').style.display = (u?.rate === 'lowrise') ? '' : 'none';
  document.getElementById('jf-site').value    = jd?.site ?? '';
  document.getElementById('jf-cname').value   = jd?.contactName ?? '';
  document.getElementById('jf-cphone').value  = jd?.contactPhone ?? '';
  document.getElementById('jf-cemail').value  = jd?.contactEmail ?? '';
  document.getElementById('jf-lockbox').value = jd?.lockbox ?? '';
  document.getElementById('jf-notes').value   = jd?.notes ?? '';
  // Delete button
  const footer = document.getElementById('job-form-footer');
  document.getElementById('job-delete-btn')?.remove();
  if (editId && J().units.length > 1) {
    const btn = document.createElement('button');
    btn.id = 'job-delete-btn';
    btn.textContent = 'Delete Job';
    btn.style.cssText = 'flex:1;padding:14px;border:none;border-radius:10px;background:#fee2e2;color:var(--red);font-size:15px;font-family:inherit;font-weight:500;cursor:pointer';
    btn.onclick = () => deleteUnit(editId);
    footer.appendChild(btn);
  }
  document.getElementById('job-form-overlay').classList.add('open');
  setTimeout(() => document.getElementById('jf-name').focus(), 300);
}
function saveJobForm() {
  const name      = document.getElementById('jf-name').value.trim();
  const rate      = document.getElementById('jf-rate').value;
  const townhouse = document.getElementById('jf-townhouse').value;
  const energyStar = document.getElementById('jf-energystar').value;
  if (!name) { document.getElementById('jf-name').focus(); return; }
  if (!rate) { document.getElementById('jf-rate').focus(); return; }
  const unit = J().units.find(x => x.id === _unitFormId);
  if (unit) { unit.name = name; unit.rate = rate; unit.townhouse = townhouse; unit.energyStar = energyStar; }
  const jd = J().details;
  jd.site         = document.getElementById('jf-site').value.trim();
  jd.contactName  = document.getElementById('jf-cname').value.trim();
  jd.contactPhone = document.getElementById('jf-cphone').value.trim();
  jd.contactEmail = document.getElementById('jf-cemail').value.trim();
  jd.lockbox      = document.getElementById('jf-lockbox').value.trim();
  jd.notes        = document.getElementById('jf-notes').value.trim();
  J().modifiedAt = new Date().toISOString();
  saveState(); closeJobForm(); renderAll();
}
function closeJobForm() { document.getElementById('job-form-overlay').classList.remove('open'); }

function addUnit() {
  const j = J();
  const used = new Set(j.units.map(u => { const m = u.name.match(/^Job (\d+)$/); return m ? +m[1] : null; }).filter(Boolean));
  let n = 1; while (used.has(n)) n++;
  j.unitCounter = Math.max(j.unitCounter || 0, n);
  j.units.push(makeUnit('Job ' + n, ++j.unitCounter));
  curUnitId = j.unitCounter; curAreaId = null;
  saveState(); renderAll(); openUnitForm(j.unitCounter);
}
function deleteUnit(id) {
  if (J().units.length === 1) return;
  showConfirm('Delete this job and all its areas?', yes => {
    if (!yes) return;
    J().units = J().units.filter(u => u.id !== id);
    if (curUnitId === id) { curUnitId = J().units[0].id; curAreaId = U().areas[0]?.id ?? null; }
    saveState(); closeJobForm(); renderAll();
  });
}
function switchUnit(id) { curUnitId = id; curAreaId = U()?.areas[0]?.id ?? null; renderAll(); }

/* ═══════════════════════════════════════════
   AREA FORM
═══════════════════════════════════════════ */

let _areaFormId = null;

function openAreaForm(editId) {
  _areaFormId = editId;
  const title  = document.getElementById('area-form-title');
  const saveBtn = document.querySelector('#area-form-overlay .sheet-save-btn');
  document.getElementById('area-delete-btn')?.remove();
  if (editId) {
    const a = U().areas.find(x => x.id === editId);
    title.textContent = 'Edit Area'; saveBtn.textContent = 'Save Changes';

function saveAreaForm() {

function save() { J().modifiedAt = new Date().toISOString(); saveState(); }

// Drywall + steel lengths
function add(key, len) { A().counts[key][len]++; save(); renderTally(); renderStrip(); renderAreaInfoBar(); }
function sub(key, len) { if (A().counts[key][len] > 0) A().counts[key][len]--; save(); renderTally(); renderStrip(); renderAreaInfoBar(); }

function editCount(key, len) {
  const id = `cnt-${key}-${encodeKey(String(len))}`;
  const el = document.getElementById(id);
  if (!el || el.tagName === 'INPUT') return;
  el.outerHTML = `<input class="sheet-count-input" id="${id}" type="number" inputmode="numeric" pattern="[0-9]*" value="${A().counts[key][len]}" min="0"
    onblur="commitCount('${key}','${encodeKey(String(len))}','${len}')" onkeydown="if(event.key==='Enter')this.blur()"/>`;
  const i = document.getElementById(id); i.focus(); i.select();
}
function commitCount(key, domSuffix, len) {
  const id = `cnt-${key}-${domSuffix}`, inp = document.getElementById(id);
  if (!inp) return;
  A().counts[key][isNaN(len) ? len : Number(len)] = Math.max(0, parseInt(inp.value) || 0);
  save(); renderTally(); renderStrip(); renderAreaInfoBar();
}

// Items that use 0.25 increments (quarter-hour billing etc.)
const DECIMAL_ITEMS = new Set(['Hourly']);

// Generic cat items (insExtras, jobExtras, drywallExtras, steel door frames)
function catItems(key) {
  const st = STEEL_SUBTYPES.find(s => s.key === key);
  if (st?.items) return st.items;
  if (key === 'drywallExtras') return DRYWALL_EXTRAS;
  if (key === 'insExtras') return INS_EXTRAS_ALL;
  if (key === 'jobExtras') return JOB_EXTRAS_ALL;
  return [];
}
function catAdd(key, idx) {
  const item = catItems(key)[idx];
  const step = DECIMAL_ITEMS.has(item) ? 0.25 : 1;
  A().counts[key][item] = Math.round(((A().counts[key][item] || 0) + step) * 100) / 100;
  save(); renderTally(); renderStrip(); renderAreaInfoBar();
}
function catSub(key, idx) {
  const item = catItems(key)[idx];
  const step = DECIMAL_ITEMS.has(item) ? 0.25 : 1;
  const cur = A().counts[key][item] || 0;
  if (cur <= 0) return;
  A().counts[key][item] = Math.round(Math.max(0, cur - step) * 100) / 100;
  save(); renderTally(); renderStrip(); renderAreaInfoBar();
}
function catEdit(key, domSuffix, idx) {
  const id = `cnt-${key}-${domSuffix}`, el = document.getElementById(id);
  if (!el || el.tagName === 'INPUT') return;
  const item = catItems(key)[idx];
  const isDecimal = DECIMAL_ITEMS.has(item);
  const cur = A().counts[key][item] || 0;
  el.outerHTML = `<input class="sheet-count-input" id="${id}" type="number" inputmode="decimal" step="${isDecimal ? '0.25' : '1'}" min="0" value="${cur}"
    onblur="catCommit('${key}',${idx})" onkeydown="if(event.key==='Enter')this.blur()"/>`;
  const i = document.getElementById(id); i.focus(); i.select();
}
function catCommit(key, idx) {
  const item = catItems(key)[idx];
  const isDecimal = DECIMAL_ITEMS.has(item);
  const id = `cnt-${key}-${encodeKey(item)}`, inp = document.getElementById(id);
  if (!inp) return;
  const raw = parseFloat(inp.value) || 0;
  A().counts[key][item] = Math.max(0, isDecimal ? Math.round(raw * 4) / 4 : Math.floor(raw));
  save(); renderTally(); renderStrip(); renderAreaInfoBar();
}

// Ceiling measurements
function ceilAdd(section) {
  const safeId = encodeKey(section);
  const lEl = document.getElementById(`ceil-l-${safeId}`), wEl = document.getElementById(`ceil-w-${safeId}`);
  const l = parseFloat(lEl.value), w = parseFloat(wEl.value);
  if (!l || !w || l <= 0 || w <= 0) { lEl.focus(); return; }
  const data = A().counts['steel_ceil'];
  if (!Array.isArray(data[section])) data[section] = [];
  data[section].push({ l, w });
  save(); lEl.value = ''; wEl.value = '';
  renderSteelAll(); renderStrip(); renderAreaInfoBar();
  setTimeout(() => { const el = document.getElementById(`ceil-l-${safeId}`); if (el) el.focus(); }, 30);
}
function ceilDel(section, i) {
  const data = A().counts['steel_ceil'];
  if (!Array.isArray(data[section])) return;
  data[section].splice(i, 1);
  save(); renderSteelAll(); renderStrip(); renderAreaInfoBar();
}

// Insulation bag entries
function insMeasAdd(typeKey, item, itemIdx) {
  const bagsEl = document.getElementById(`ins-bags-${itemIdx}`);
  const sqftEl = document.getElementById(`ins-sqft-${itemIdx}`);
  const bags = parseFloat(bagsEl.value), sqftPerBag = parseFloat(sqftEl.value);
  if (!bags || !sqftPerBag || bags <= 0 || sqftPerBag <= 0) { bagsEl.focus(); return; }
  A().counts['insulation'][typeKey][item].push({ bags, sqftPerBag });
  save(); bagsEl.value = ''; sqftEl.value = '';
  renderInsulation(); renderStrip(); renderAreaInfoBar();
  setTimeout(() => { const el = document.getElementById(`ins-bags-${itemIdx}`); if (el) el.focus(); }, 30);
}
function insMeasDel(typeKey, item, idx) {
  A().counts['insulation'][typeKey][item].splice(idx, 1);
  save(); renderInsulation(); renderStrip(); renderAreaInfoBar();
}

function renderAreaInfoBar() {
  const bar = document.getElementById('area-info-bar');
  if (!A()) { bar.innerHTML = ''; return; }
  const chips = [];

  // Ceiling height
  if (A().height) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">Ceiling</span><span class="area-info-chip-val">${A().height}</span></div>`);

  // Drywall — ½", ⅝", Durock
  const halfSqft  = HALF_GROUPS.reduce((s,g)=>s+Object.entries(A().counts[g.key]||{}).reduce((x,[l,q])=>x+sheetSqft(g.key,Number(l))*q,0),0);
  const fivetSqft = FIVET_GROUPS.reduce((s,g)=>s+Object.entries(A().counts[g.key]||{}).reduce((x,[l,q])=>x+sheetSqft(g.key,Number(l))*q,0),0);
  const durockSqft = Object.entries(A().counts['durock']||{}).reduce((s,[l,q])=>s+sheetSqft('durock',Number(l))*q,0);
  if (halfSqft>0)   chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">½"</span><span class="area-info-chip-val">${halfSqft} ft²</span></div>`);
  if (fivetSqft>0)  chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">⅝"</span><span class="area-info-chip-val">${fivetSqft} ft²</span></div>`);
  if (durockSqft>0) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">Durock</span><span class="area-info-chip-val">${durockSqft} ft²</span></div>`);

  // Drywall Extras (e.g. Screws)
  DRYWALL_EXTRAS.forEach(item => {
    const v = A().counts['drywallExtras']?.[item] || 0;
    if (v>0) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">${item}</span><span class="area-info-chip-val">${v}</span></div>`);
  });

  // Insulation
  INSULATION_TYPES.forEach(t => {
    t.items.forEach(item => {
      const entries = Array.isArray(A().counts['insulation']?.[t.key]?.[item]) ? A().counts['insulation'][t.key][item] : [];
      const sqft = Math.round(entries.reduce((s,e) => s+e.bags*e.sqftPerBag, 0));
      if (sqft>0) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">${t.label} ${item}</span><span class="area-info-chip-val">${sqft} ft²</span></div>`);
    });
  });

  // Insulation Extras
  INS_EXTRAS_ALL.forEach(item => {
    const v = A().counts['insExtras']?.[item] || 0;
    if (v>0) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">${item}</span><span class="area-info-chip-val">${v}</span></div>`);
  });

  // Steel
  STEEL_SUBTYPES.forEach(st => {
    if (st.kind === 'measure') {
      let sqft = 0;
      st.sections.forEach(sec => { sqft += Math.round((Array.isArray(A().counts[st.key]?.[sec]) ? A().counts[st.key][sec] : []).reduce((s,m) => s+m.l*m.w, 0)); });

    } else if (st.items) {
      st.items.forEach(item => {
        const v = A().counts[st.key]?.[item] || 0;
        if (v>0) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">${item}</span><span class="area-info-chip-val">${v}</span></div>`);
      });
    } else {
      const ft = STEEL_LENGTHS.reduce((s,l) => s+(A().counts[st.key]?.[l]||0)*l, 0);
      if (ft>0) chips.push(`<div class="area-info-chip"><span class="area-info-chip-label">${st.label}</span><span class="area-info-chip-val">${ft}'</span></div>`);
    }

  // Corner Beads — show total linear feet
  CORNER_BEAD_SUBTYPES.forEach(st => {

  });

  bar.innerHTML = chips.length ? `<div class="area-info-scroll">${chips.join('')}</div>` : '';

function renderGroupedCounters(areaEl, countKey, col, paid, purchased) {
  if (!A()) { areaEl.innerHTML = emptyState(); return; }
  const c = A().counts[countKey];
  function renderGroup(title, items, startIdx) {
    const total = items.reduce((s,item) => s+(c[item]||0), 0);
    const totalDisplay = Number.isInteger(total) ? total : total.toFixed(2);
    let html = `<div class="section-head" style="color:${col}">
      <span>${title}</span>
      ${total > 0 ? `<span style="font-weight:500;color:var(--muted)">Total: <span style="font-family:'DM Mono',monospace;color:var(--text)">${totalDisplay}</span></span>` : ''}
    </div><div class="sheet-grid">`;
    items.forEach((item, i) => {
      const idx = startIdx + i;
      const val = c[item] || 0;
      const display = DECIMAL_ITEMS.has(item) ? val.toFixed(2) : val;
      html += `<div class="sheet-card" style="border-color:${col}22">
        <div class="sheet-card-top" style="background:${col}0d">
          <div class="sheet-ft" style="color:${col}99;font-size:11px;white-space:normal;line-height:1.3">${item}</div>
          <div class="sheet-count" style="color:${col}" id="cnt-${countKey}-${encodeKey(item)}" onclick="catEdit('${countKey}','${encodeKey(item)}',${idx})">${display}</div>
        </div>
        <div class="sheet-card-controls" style="border-top-color:${col}22">
          <button class="ctrl" style="--add-color:${col}" onclick="catSub('${countKey}',${idx})">−</button>
          <div class="ctrl-divider" style="background:${col}22"></div>
          <button class="ctrl" style="--add-color:${col}" onclick="catAdd('${countKey}',${idx})">+</button>
        </div>
      </div>`;
    });
    return html + `</div>`;
  }
  areaEl.innerHTML =
    (paid.length ? renderGroup('Paid Extras', paid, 0) : '') +
    (purchased.length ? renderGroup('Purchased Extras', purchased, paid.length) : '');
}

function renderStrip() {
  const strip = document.getElementById('totals-strip');
  if (!A()) { strip.innerHTML = ''; return; }
  let chips = '';

  if (curCat === 'drywall') {
    const half  = HALF_GROUPS.reduce((s,g) => s+Object.entries(A().counts[g.key]||{}).reduce((x,[l,q]) => x+sheetSqft(g.key,Number(l))*q,0),0);
    const fivet = FIVET_GROUPS.reduce((s,g) => s+Object.entries(A().counts[g.key]||{}).reduce((x,[l,q]) => x+sheetSqft(g.key,Number(l))*q,0),0);
    const durock = Object.entries(A().counts['durock']||{}).reduce((s,[l,q]) => s+sheetSqft('durock',Number(l))*q,0);
    if (half>0)   chips += `<div class="strip-chip">½" <strong>${half} ft²</strong></div>`;
    if (fivet>0)  chips += `<div class="strip-chip">⅝" <strong>${fivet} ft²</strong></div>`;
    if (durock>0) chips += `<div class="strip-chip">Durock <strong>${durock} ft²</strong></div>`;
    DRYWALL_EXTRAS.forEach(item => {
      const v = A().counts['drywallExtras']?.[item] || 0;
      if (v>0) chips += `<div class="strip-chip">${item} <strong>${v}</strong></div>`;
    });
  } else if (curCat === 'insulation') {
    INSULATION_TYPES.forEach(t => {
      t.items.forEach(item => {
        const entries = Array.isArray(A().counts['insulation'][t.key]?.[item]) ? A().counts['insulation'][t.key][item] : [];
        const sqft = Math.round(entries.reduce((s,e) => s+e.bags*e.sqftPerBag, 0));
        if (sqft>0) chips += `<div class="strip-chip">${t.label} ${item} <strong>${sqft} ft²</strong></div>`;
      });
    });
  } else if (curCat === 'steel') {
    STEEL_SUBTYPES.forEach(st => {
      if (st.kind === 'measure') {
        let sqft = 0;
        st.sections.forEach(sec => { sqft += Math.round((Array.isArray(A().counts[st.key]?.[sec]) ? A().counts[st.key][sec] : []).reduce((s,m) => s+m.l*m.w, 0)); });
        if (sqft>0) chips += `<div class="strip-chip">${st.label} <strong>${sqft} ft²</strong></div>`;
      } else if (st.items) {
        st.items.forEach(item => {
          const v = A().counts[st.key]?.[item] || 0;
          if (v>0) chips += `<div class="strip-chip">${item} <strong>${v}</strong></div>`;
        });
      } else {
        const ft = STEEL_LENGTHS.reduce((s,l) => s+(A().counts[st.key]?.[l]||0)*l, 0);
        if (ft>0) chips += `<div class="strip-chip">${st.label} <strong>${ft}'</strong></div>`;
      }
    });
  } else if (curCat === 'cornerBeads') {
    CORNER_BEAD_SUBTYPES.forEach(st => {
      const totalLf = CORNER_BEAD_LENGTHS.reduce((s,l) => s+(A().counts[st.key]?.[l]||0)*l, 0);
      if (totalLf>0) chips += `<div class="strip-chip">${st.label} <strong>${totalLf}'</strong></div>`;
    });
  } else if (curCat === 'jobExtras') {
    JOB_EXTRAS_ALL.forEach(item => {
      const v = A().counts['jobExtras']?.[item] || 0;
      if (v>0) chips += `<div class="strip-chip">${item} <strong>${v}</strong></div>`;
    });
  }

  strip.innerHTML = chips;
}

let prices = {};
function loadPrices() {
  try { const raw = localStorage.getItem('employee-tally-prices'); if (raw) prices = JSON.parse(raw); } catch(e) {}
  PRICE_FIELDS.forEach(f => { if (prices[f.key] === undefined) prices[f.key] = f.default; });
}
function savePricesData() {
  try { localStorage.setItem('employee-tally-prices', JSON.stringify(prices)); } catch(e) {}
}
loadPrices();

function applyRateYear(idx) {
  PRICE_FIELDS.forEach(f => {
    if (!f.rates) return;
    if (f.rates[idx] === 0) return; // don't overwrite manually-entered values with 0
    const inp = document.getElementById('price-' + f.key);
    if (inp) inp.value = f.rates[idx].toFixed(3);
  });
  [0,1,2].forEach(i => {
    const btn = document.getElementById('rate-yr-btn-' + i);
    if (btn) btn.style.cssText = i === idx
      ? 'flex:1;padding:8px 4px;border:none;border-radius:8px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;background:var(--purple);color:#fff'
      : 'flex:1;padding:8px 4px;border:1.5px solid #dbeafe;border-radius:8px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;background:transparent;color:var(--purple)';
  });
}

function drywallPrice(isHalf, rate, height) {
  const prefix = isHalf ? 'half' : 'fivet';
  const rk = rate === 'lowrise' ? 'lr' : 'hr';
  const hMap = { "8'": '8', "9'": '9', "10'": '10', "11'": '11', "12'+": '12' };
  let hk = hMap[height] || (rate === 'lowrise' ? '8' : '9');
  if (rk === 'hr' && hk === '8') hk = '9';
  return prices[`${prefix}_${rk}_${hk}`] ?? prices[`${prefix}_${rk}_9`] ?? 0;
}

function studsPrice(height) {
  const hMap = { "8'": 'studs_8', "9'": 'studs_9', "10'": 'studs_10', "11'": 'studs_11', "12'+": 'studs_12' };
  const key = hMap[height] || 'studs_8';
  return prices[key] ?? 0;
}

function insPrice(typeKey, item, rate) {
  if (rate === 'lowrise') {
    const lrMap = { pink: 'ins_lr_pink', rockwool: 'ins_lr_rock', r24: 'ins_lr_r24' };
    return prices[lrMap[typeKey] ?? 'ins_lr_pink'] ?? 0;
  }
  const map = {
    pink:     { Interior: 'ins_pink_int', Exterior: 'ins_pink_ext' },
    rockwool: { Interior: 'ins_rock_int', Exterior: 'ins_rock_ext' },
    r24:      { Interior: 'ins_r24_int',  Exterior: 'ins_r24_ext'  },
  };
  return prices[map[typeKey]?.[item]] ?? 0;
}

const EXTRAS_PRICE_MAP = {
  'Pot Light/Sprinkler': 'pot_light', 'Tray/Waffle': 'tray_waffle',
  "2' × 4' Skylight": 'skylight_24', "4' × 4' Skylight": 'skylight_44',
  'Round Stairs': 'round_stairs', 'OTA/Cathedral': 'ota',
  'Hourly': 'hourly',
};
const INS_PURCH_PRICE_MAP = {
  "8' Poly": 'poly_roll', "9' Poly": 'poly_roll', "10' Poly": 'poly_roll', "12' Poly": 'poly_roll',
  'Tuck Tape': 'tuck_tape', 'Acoustic Caulking': 'acous_caulk',

};

function showReport() {
  const j = J();
  document.getElementById('modal-title').textContent = 'Pay Period - ' + j.name;
  document.getElementById('modal-invoice-date').textContent = j.modifiedAt ? new Date(j.modifiedAt).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
  const d = j.details;

  let html = '';

  // Pay period details header
  const detailRows = [
    d.site         ? ['Site',         d.site]         : null,
    d.notes        ? ['Notes',        d.notes]         : null,
  ].filter(Boolean);

  if (detailRows.length) {
    html += `<div style="margin-bottom:16px;padding-bottom:14px;border-bottom:1.5px solid var(--border-md)">`;
    detailRows.forEach(([label, val]) => {
      html += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px">
        <span style="color:var(--muted);font-weight:600">${label}</span>
        <span style="text-align:right;max-width:60%;word-break:break-word">${val}</span>
      </div>`;
    });
    html += `</div>`;
  }

  let hasAny = false;
  const areaSubtotals = [];
  const allCostItems = []; // collected across all areas, rendered once at the bottom

  j.units.forEach(u => {
    // Show job unit header if multiple jobs exist
    if (j.units.length > 1) {
      html += `<div style="font-size:15px;font-weight:700;color:#111;margin:20px 0 6px;padding-bottom:8px;border-bottom:2px solid #e5e7eb">${u.name}${u.rate ? ' — ' + u.rate.charAt(0).toUpperCase() + u.rate.slice(1) : ''}</div>`;
    }
    u.areas.forEach(a => {
      // Check if area has anything
      const anyDrywall   = DRYWALL_KEYS.some(key => Object.values(a.counts[key]||{}).some(v=>v>0));
      const anyIns       = INSULATION_TYPES.some(t => t.items.some(item => (Array.isArray(a.counts['insulation']?.[t.key]?.[item]) ? a.counts['insulation'][t.key][item] : []).length > 0));
      const anySteel     = STEEL_SUBTYPES.some(st => {
        if (st.kind === 'measure') return st.sections.some(sec => (Array.isArray(a.counts[st.key]?.[sec]) ? a.counts[st.key][sec] : []).length > 0);
        if (st.items) return st.items.some(item => (a.counts[st.key]?.[item]||0) > 0);
        return STEEL_LENGTHS.some(l => (a.counts[st.key]?.[l]||0) > 0);
      });
      const anyCornerBeads = CORNER_BEAD_SUBTYPES.some(st =>
        CORNER_BEAD_LENGTHS.some(l => (a.counts[st.key]?.[l]||0) > 0));
      const anyDrywallExtras = DRYWALL_EXTRAS.some(item => (a.counts['drywallExtras']?.[item]||0) > 0);
      const anyExtras    = [...INS_EXTRAS_ALL, ...JOB_EXTRAS_ALL].some(item =>
        (a.counts['insExtras']?.[item]||0) > 0 || (a.counts['jobExtras']?.[item]||0) > 0);
      if (!anyDrywall && !anyIns && !anySteel && !anyCornerBeads && !anyDrywallExtras && !anyExtras) return;

      hasAny = true;
      html += `<div class="modal-area-head">Area - ${a.name}${a.height ? ` - ${a.height}` : ''}</div>`;

      const lineItems = [];
      const costItems = [];
      const rate   = u.rate || 'highrise';
      const height = a.height || '';

      // Drywall
      const halfSqft  = HALF_GROUPS.reduce((s,g) => s+g.lengths.reduce((x,l) => x+sheetSqft(g.key,l)*(a.counts[g.key]?.[l]||0), 0), 0);
      const fivetSqft = FIVET_GROUPS.reduce((s,g) => s+g.lengths.reduce((x,l) => x+sheetSqft(g.key,l)*(a.counts[g.key]?.[l]||0), 0), 0);
      const durockSqft = DUROCK_LENGTHS.reduce((s,l) => s+sheetSqft('durock',l)*(a.counts['durock']?.[l]||0), 0);
      if (halfSqft>0)   { const p = drywallPrice(true,  rate, height); lineItems.push({ label:'½"',    qty:`${halfSqft} ft²`,   price:p, sub:halfSqft*p,   col:'#2563eb' }); }
      if (fivetSqft>0)  { const p = drywallPrice(false, rate, height); lineItems.push({ label:'⅝"',   qty:`${fivetSqft} ft²`,  price:p, sub:fivetSqft*p,  col:'#dc2626' }); }
      if (durockSqft>0) { const p = prices['durock']||0;               lineItems.push({ label:'Durock', qty:`${durockSqft} ft²`, price:p, sub:durockSqft*p, col:'#111' }); }

      // Insulation — lowrise uses a single all-in rate (Interior entry only); skip Exterior
      INSULATION_TYPES.forEach(t => {
        t.items.forEach(item => {
          if (rate === 'lowrise' && item === 'Exterior') return;
          const entries = Array.isArray(a.counts['insulation']?.[t.key]?.[item]) ? a.counts['insulation'][t.key][item] : [];
          if (!entries.length) return;
          const sqft = Math.round(entries.reduce((s,e) => s+e.bags*e.sqftPerBag, 0));
          if (!sqft) return;
          const p = insPrice(t.key, item, rate);
          lineItems.push({ label: item === 'Interior' ? t.label : `${t.label} - ${item}`, qty:`${sqft} ft²`, price:p, sub:sqft*p, col:t.color });
        });
      });

      // Studs
      const studsFt = STEEL_LENGTHS.reduce((s,l) => s+(a.counts['steel_studs']?.[l]||0)*l, 0);
      if (studsFt>0) { const p = studsPrice(height); lineItems.push({ label:'Studs', qty:`${studsFt}'`, price:p, sub:studsFt*p, col:'#475569' }); }

      // Ceilings
      const ceilSt = STEEL_SUBTYPES.find(x => x.key === 'steel_ceil');
      ceilSt.sections.forEach(sec => {
        const entries = Array.isArray(a.counts['steel_ceil']?.[sec]) ? a.counts['steel_ceil'][sec] : [];
        const sqft = Math.round(entries.reduce((s,m) => s+m.l*m.w, 0));
        if (!sqft) return;
        const pk = sec === 'Suspended Ceiling' ? 'ceil_susp' : 'ceil_hang';
        lineItems.push({ label:sec, qty:`${sqft} ft²`, price:prices[pk]||0, sub:sqft*(prices[pk]||0), col:'#475569' });
      });

      // Door Frames
      const single = a.counts['steel_doors']?.['Single'] || 0;
      const double = a.counts['steel_doors']?.['Double'] || 0;
      if (single>0) lineItems.push({ label:'Door Frame Single', qty:single, price:prices['door_single']||0, sub:single*(prices['door_single']||0), col:'#475569' });
      if (double>0) lineItems.push({ label:'Door Frame Double', qty:double, price:prices['door_double']||0, sub:double*(prices['door_double']||0), col:'#475569' });

      // Corner Beads — group by subtype, show total lf with per-lf rate (like studs)
      CORNER_BEAD_SUBTYPES.forEach(st => {
        let totalLf = 0;
        let totalCost = 0;
        let hasPrice = true;
        CORNER_BEAD_LENGTHS.forEach(l => {
          const qty = a.counts[st.key]?.[l] || 0;
          if (!qty) return;
          const pk = st.key === 'cb_regular' ? 'cb_regular_' + l : 'cb_bullnose_' + l;
          const stickPrice = prices[pk] ?? null;
          totalLf += qty * l;
          if (stickPrice !== null) totalCost += qty * stickPrice;
          else hasPrice = false;
        });
        if (!totalLf) return;
        // Derive per-lf rate from the first non-zero length's stick price
        let perLfRate = null;
        for (const l of CORNER_BEAD_LENGTHS) {
          const qty = a.counts[st.key]?.[l] || 0;
          if (!qty) continue;
          const pk = st.key === 'cb_regular' ? 'cb_regular_' + l : 'cb_bullnose_' + l;
          const stickPrice = prices[pk] ?? null;
          if (stickPrice !== null && l > 0) { perLfRate = stickPrice / l; break; }
        }
        lineItems.push({ label: st.label, qty:`${totalLf}'`, price: perLfRate, sub: hasPrice ? totalCost : null, col:'#b45309' });
      });

      // Insulation Extras — Purchased (costs, deducted)
      INS_EXTRAS_PURCHASED.forEach(item => {
        const qty = a.counts['insExtras']?.[item] || 0;
        if (!qty) return;
        const pk = INS_PURCH_PRICE_MAP[item];
        const p = pk ? (prices[pk] || 0) : 0;
        costItems.push({ label:`${item} (${a.name})`, qty, price:p||null, sub:p?qty*p:null, col:'#db2777' });
      });

      // Drywall Extras — Purchased (costs, deducted)
      DRYWALL_EXTRAS.forEach(item => {
        const qty = a.counts['drywallExtras']?.[item] || 0;
        if (!qty) return;
        const p = prices['screws_box'] || 0;
        costItems.push({ label:`${item} (${a.name})`, qty, price:p||null, sub:p?qty*p:null, col:'#0891b2' });
      });

      // Job Extras — Paid
      JOB_EXTRAS_PAID.forEach(item => {
        let qty = a.counts['jobExtras']?.[item] || 0;
        if (!qty) return;
        const pk = EXTRAS_PRICE_MAP[item];
        const p = pk ? (prices[pk]||0) : null;
        const qtyDisplay = DECIMAL_ITEMS.has(item) ? qty.toFixed(2) + ' hrs' : qty;
        // First 5 pot lights/sprinklers are included free
        if (item === 'Pot Light/Sprinkler') {
          const billable = Math.max(0, qty - 5);
          if (billable === 0) {
            lineItems.push({ label:'Pot Light/Sprinkler (' + qty + ' incl.)', qty:qty, price:0, sub:0, col:'#0891b2' });
          } else {
            lineItems.push({ label:'Pot Light/Sprinkler (' + qty + ' total, ' + Math.min(qty,5) + ' free, ' + billable + ' charged)', qty:billable, price:p, sub:p!==null?billable*p:null, col:'#0891b2' });
          }
          return;
        }
        lineItems.push({ label:item, qty:qtyDisplay, price:p, sub:p!==null?qty*p:null, col:'#0891b2' });
      });

      if (!lineItems.length && !costItems.length) return;

      // Earned items table
      if (lineItems.length) {
        html += `<table class="inv-table">
          <colgroup><col style="width:40%"><col style="width:22%"><col style="width:18%"><col style="width:20%"></colgroup>
          <thead><tr><th>Item</th><th style="text-align:right">Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>`;
        lineItems.forEach(row => {
          html += `<tr>
            <td style="color:${row.col};font-weight:500">${row.label}</td>
            <td style="text-align:right">${row.qty}</td>
            <td style="text-align:right">${row.price !== null ? fmt$(row.price) : '—'}</td>
            <td style="text-align:right">${row.sub !== null ? fmt$(row.sub) : '—'}</td>
          </tr>`;
        });
        html += `</tbody></table>`;
      }
      const areaSub = lineItems.reduce((s,r) => s+(r.sub||0), 0);
      areaSubtotals.push(areaSub);
      html += `<div class="inv-area-sub">Area Subtotal: <strong>${fmt$(areaSub)}</strong></div>`;

      // Collect cost items for the consolidated deductions section at the bottom
      costItems.forEach(item => allCostItems.push(item));
    });
  });

  if (!hasAny) {
    html = `<div class="empty-msg">No items tallied yet.</div>`;
  } else {
    const totalSub  = areaSubtotals.reduce((s,x) => s+x, 0);
    const totalCost = allCostItems.reduce((s,r) => s+(r.sub||0), 0);
    const netSub    = totalSub - totalCost;
    const hst       = netSub * 0.13;
    const grand     = netSub + hst;

    // Consolidated deductions table at the bottom
    if (allCostItems.length) {
      html += `<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--red);margin:18px 0 4px">Deductions (Your Cost)</div>
        <table class="inv-table">
        <colgroup><col style="width:40%"><col style="width:22%"><col style="width:18%"><col style="width:20%"></colgroup>
        <thead><tr><th>Item</th><th style="text-align:right">Qty</th><th style="text-align:right">Price</th><th style="text-align:right">Cost</th></tr></thead><tbody>`;
      allCostItems.forEach(row => {
        html += `<tr>
          <td style="color:${row.col};font-weight:500">${row.label}</td>
          <td style="text-align:right">${row.qty}</td>
          <td style="text-align:right">${row.price !== null ? fmt$(row.price) : '—'}</td>
          <td style="text-align:right;color:var(--red)">${row.sub !== null ? `(${fmt$(row.sub)})` : '—'}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      html += `<div class="inv-area-sub" style="color:var(--red)">Total Deductions: <strong>(${fmt$(totalCost)})</strong></div>`;
    }

    html += `<div class="inv-totals">
      <div class="inv-totals-row"><span>Subtotal</span><span class="mono">${fmt$(totalSub)}</span></div>
      ${totalCost > 0 ? `<div class="inv-totals-row" style="color:var(--red)"><span>Deductions</span><span class="mono">(${fmt$(totalCost)})</span></div>` : ''}
      ${totalCost > 0 ? `<div class="inv-totals-row" style="border-top:1px solid var(--border-md);padding-top:8px"><span>Net Subtotal</span><span class="mono">${fmt$(netSub)}</span></div>` : ''}
      <div class="inv-totals-row"><span>HST (13%)</span><span class="mono">${fmt$(hst)}</span></div>
      <div class="inv-totals-row grand"><span>Grand Total</span><span class="mono">${fmt$(grand)}</span></div>
    </div>`;
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
